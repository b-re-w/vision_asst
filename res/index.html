<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vision Assistant</title>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/res/manifest.json">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="/res/css/style.css" />
</head>
<body>
<div class="scene">
  <!-- Ambient orbs: background-color reacts to camera color via CSS @property -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="scene-noise"></div>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <span class="logo">✦</span>
      <h1>Vision Assistant</h1>
      <div class="status-dot" id="status-dot"></div>
    </header>

    <!-- Camera -->
    <section class="camera-section">
      <div class="camera-frame">
        <video id="video" autoplay playsinline muted></video>
        <div class="camera-placeholder" id="cam-placeholder">
          <span class="icon">⬛</span>
          <span>카메라 연결 대기 중</span>
        </div>
        <!-- Corner brackets -->
        <div class="cam-corner tl"></div>
        <div class="cam-corner tr"></div>
        <div class="cam-corner bl"></div>
        <div class="cam-corner br"></div>
        <!-- Rec indicator -->
        <div class="rec-dot" id="rec-dot">
          <div class="rec-dot-circle"></div>
          <span class="rec-dot-label">REC</span>
        </div>
      </div>
    </section>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Chat -->
    <section class="chat-section">
      <div class="chat-messages" id="messages"></div>
    </section>

    <!-- Controls -->
    <footer class="controls">
      <button class="btn-toggle" id="btn-toggle">Connect</button>
      <div class="mic-ring" id="mic-ring">
        <div class="mic-bars" id="mic-bars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </footer>

  </div>
</div>
<script src="/res/js/app.js"></script>
</body>
</html>
